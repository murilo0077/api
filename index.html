<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Farmador de Aura</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #05020a;
        }


        .video-wall {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: space-between;
            z-index: 1;
        }

        .video-container {
            width: 33.33%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }


        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 5, 20, 0.6);
            z-index: 2;
            pointer-events: none;
        }


        .login-card {
            position: relative;
            z-index: 3;
            background: rgba(20, 10, 35, 0.3); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 35px 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
            color: #fff;
        }


        .login-card::-webkit-scrollbar {
            width: 6px;
        }
        .login-card::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.5);
            border-radius: 10px;
        }

        .login-card h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 25px;
            text-align: center;
            background: linear-gradient(45deg, #e9d5ff, #a855f7, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }


        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-group {
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #cbd5e1;
            text-transform: uppercase;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        .input-group select option {
            background-color: #140a23;
            color: #fff;
        }

        .input-group input:focus, .input-group select:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #a855f7;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.5);
        }

        .btn-submit {
            grid-column: span 2;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(168, 85, 247, 0.6);
        }

        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width, .btn-submit {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="video-wall">
        <div class="video-container"><video autoplay loop muted playsinline><source src="download.mp4" type="video/mp4"></video></div>
        <div class="video-container"><video autoplay loop muted playsinline><source src="download.mp4" type="video/mp4"></video></div>
        <div class="video-container"><video autoplay loop muted playsinline><source src="download.mp4" type="video/mp4"></video></div>
    </div>

    <div class="overlay"></div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="login-card">
        <h2>cadastrar farmador de aura ✨</h2>
        
        <form onsubmit="enviar_cadastro(event)" class="form-grid">
            <div class="input-group full-width">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Digite seu nome">
            </div>
            
            <div class="input-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" required placeholder="000.000.000-00">
            </div>

            <div class="input-group">
                <label for="nascimento">Data de Nascimento</label>
                <input type="date" id="nascimento" required>
            </div>
            
            <div class="input-group">
                <label for="cep">CEP</label>
                <input type="text" id="cep" required placeholder="00000-000">
            </div>

            <div class="input-group">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" required placeholder="Seu bairro">
            </div>

            <div class="input-group full-width">
                <label for="rua">Rua / Logradouro</label>
                <input type="text" id="rua" required placeholder="Av / Rua...">
            </div>

            <div class="input-group">
                <label for="numero">Número</label>
                <input type="text" id="numero" required placeholder="123">
            </div>

            <div class="input-group">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" required placeholder="Sua cidade">
            </div>

            <div class="input-group">
                <label for="uf">UF</label>
                <select id="uf" required>
                    <option value="" disabled selected>Selecione</option>
                    <option value="AC">AC</option>
                    <option value="AL">AL</option>
                    <option value="AM">AM</option>
                    <option value="AP">AP</option>
                    <option value="BA">BA</option>
                    <option value="CE">CE</option>
                    <option value="DF">DF</option>
                    <option value="ES">ES</option>
                    <option value="GO">GO</option>
                    <option value="MA">MA</option>
                    <option value="MG">MG</option>
                    <option value="MS">MS</option>
                    <option value="MT">MT</option>
                    <option value="PA">PA</option>
                    <option value="PB">PB</option>
                    <option value="PE">PE</option>
                    <option value="PI">PI</option>
                    <option value="PR">PR</option>
                    <option value="RJ">RJ</option>
                    <option value="RN">RN</option>
                    <option value="RO">RO</option>
                    <option value="RR">RR</option>
                    <option value="RS">RS</option>
                    <option value="SC">SC</option>
                    <option value="SE">SE</option>
                    <option value="SP">SP</option>
                    <option value="TO">TO</option>
                </select>
            </div>

            <div class="input-group">
                <label for="celular">Celular</label>
                <input type="tel" id="celular" required placeholder="(11) 99999-0000">
            </div>

            <div class="input-group full-width">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            
            <div class="input-group full-width">
                <label for="senha">Senha</label>
                <input type="password" id="senha" required placeholder="••••••••••••">
            </div>
            
            <button type="submit" class="btn-submit">FINALIZAR CADASTRO ⚡</button>
        </form>
    </div>

    <script>
 
        function iniciarMusica() {
            const audio = document.getElementById('bg-music');
            audio.play().catch(e => console.log("Áudio aguardando clique..."));
        }
        document.addEventListener('click', iniciarMusica, { once: true });
        document.addEventListener('keydown', iniciarMusica, { once: true });


        function pegar_dados(){
            const dados = {
                nnome: document.getElementById("nome").value,
                cpf: document.getElementById("cpf").value,
                cep: document.getElementById("cep").value,
                nascimento: document.getElementById("nascimento").value,
                rua: document.getElementById("rua").value,
                numero: document.getElementById("numero").value,
                bairro: document.getElementById("bairro").value,
                cidade: document.getElementById("cidade").value,
                uf: document.getElementById("uf").value,
                email: document.getElementById("email").value,
                celular: document.getElementById("celular").value,
                senha: document.getElementById("senha").value
            }
            return JSON.stringify(dados)
        }

        async function enviar_cadastro(event){
            if (event) event.preventDefault();
            const dados = pegar_dados()
            try {
                const resposta = await fetch ("https://10.216.243.15:3000/clients",{
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: dados 
                })
                if (!resposta.ok) { 
                    alert("Erro ao cadastrar! ");
                    return;
                }
                alert("Clientes cadastrado com sucesso!");
            } catch(error) {
                alert("Erro ao cadastrar: " + error.message);
            }
        }
    </script>

</body>
</html>
